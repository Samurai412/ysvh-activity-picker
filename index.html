<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSVH Activity Picker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-effects">
        <div class="floating-shapes"></div>
        <div class="particle-container" id="particles"></div>
    </div>
    
    <div class="container">
        <header>
            <h1 class="glitch" data-text="YSVH">YSVH</h1>
            <p class="subtitle">Voice Chat Activity Picker</p>
        </header>

        <main>
            <div class="picker-container">
                <div class="slot-machine" id="slotMachine">
                    <div class="slot-window">
                        <div class="slot-reel" id="slotReel">
                            <!-- Activities will be populated here -->
                        </div>
                    </div>
                    <div class="slot-overlay top"></div>
                    <div class="slot-overlay bottom"></div>
                </div>

                <div class="selected-activity" id="selectedActivity">
                    <div class="activity-card hidden" id="activityCard">
                        <div class="card-glow"></div>
                        <div class="card-content">
                            <span class="category-badge" id="categoryBadge"></span>
                            <h2 id="activityName"></h2>
                            <p id="activityDescription"></p>
                            <a href="#" id="activityLink" target="_blank" class="go-button">
                                <span>Let's Go!</span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M5 12h14M12 5l7 7-7 7"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <button class="pick-button" id="pickButton">
                        <span class="button-bg"></span>
                        <span class="button-text">
                            <span class="icon">🎲</span>
                            Pick Random Activity
                        </span>
                    </button>
                    
                    <div class="filter-container">
                        <button class="filter-toggle" id="filterToggle">
                            <span>Filter by Tags</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9l6 6 6-6"/>
                            </svg>
                        </button>
                        <div class="filter-dropdown hidden" id="filterDropdown">
                            <label class="filter-option">
                                <input type="checkbox" value="all" checked> All Activities
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <section class="activity-grid-section">
                <h2 class="section-title">
                    <span class="title-decoration"></span>
                    All Activities
                    <span class="title-decoration"></span>
                </h2>
                <div class="activity-grid" id="activityGrid">
                    <!-- Activities will be populated here -->
                </div>
            </section>
        </main>

        <!-- Admin Button -->
        <button class="admin-toggle" id="adminToggle" title="Admin Panel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
            </svg>
        </button>

        <!-- Admin Panel Modal -->
        <div class="admin-modal hidden" id="adminModal">
            <div class="admin-overlay" id="adminOverlay"></div>
            <div class="admin-panel">
                <button class="admin-close" id="adminClose">&times;</button>
                
                <!-- Passcode Screen -->
                <div class="admin-passcode" id="adminPasscode">
                    <h2>🔐 Admin Access</h2>
                    <p>Enter passcode to manage activities</p>
                    <div class="passcode-input-container">
                        <input type="password" id="passcodeInput" maxlength="4" placeholder="••••" autocomplete="off">
                        <button class="passcode-submit" id="passcodeSubmit">Unlock</button>
                    </div>
                    <p class="passcode-error hidden" id="passcodeError">Incorrect passcode</p>
                </div>
                
                <!-- Admin Dashboard (hidden until unlocked) -->
                <div class="admin-dashboard hidden" id="adminDashboard">
                    <h2>⚙️ Activity Manager</h2>
                    
                    <!-- Add Activity Form -->
                    <div class="admin-section">
                        <h3>➕ Add New Activity</h3>
                        <form id="addActivityForm" class="activity-form">
                            <input type="text" id="newActivityName" placeholder="Activity Name" required>
                            <input type="url" id="newActivityUrl" placeholder="https://example.com" required>
                            <div class="tags-label">Select Tags:</div>
                            <div id="newActivityCategory" class="tag-checkbox-container">
                                <!-- Tags will be populated dynamically -->
                            </div>
                            <input type="text" id="newActivityDescription" placeholder="Brief description" required>
                            <button type="submit" class="admin-btn add-btn">Add Activity</button>
                        </form>
                    </div>
                    
                    <!-- Manage Activities -->
                    <div class="admin-section">
                        <h3>📋 Manage Activities</h3>
                        <div class="admin-activity-list" id="adminActivityList">
                            <!-- Activities listed here -->
                        </div>
                    </div>
                    
                    <!-- Import/Export -->
                    <div class="admin-section">
                        <h3>💾 Backup & Restore</h3>
                        <div class="backup-buttons">
                            <button class="admin-btn" id="exportBtn">Export Activities</button>
                            <button class="admin-btn" id="importBtn">Import Activities</button>
                            <button class="admin-btn reset-btn" id="resetBtn">Reset to Default</button>
                        </div>
                        <input type="file" id="importFile" accept=".json" style="display: none;">
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Made with 💛 for YSVH Voice Chat</p>
        </footer>
    </div>

    <div class="confetti-container" id="confetti"></div>

    <script src="activities.js"></script>
    <script src="script.js"></script>
</body>
</html>
